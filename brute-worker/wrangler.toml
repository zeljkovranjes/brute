name = "brute-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cargo install worker-build && worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "brute"
database_id = "YOUR_D1_DATABASE_ID"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "brute_attacks"

[durable_objects]
bindings = [
  { name = "WS_BROADCASTER", class_name = "WsBroadcaster" }
]

[[migrations]]
tag = "v1"
new_classes = ["WsBroadcaster"]

[vars]
BEARER_TOKEN = ""
ABUSEIPDB_KEY = ""
