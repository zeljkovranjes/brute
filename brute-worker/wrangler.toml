name = "worker-brute"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Free tier build (default):
#   cargo install worker-build && worker-build --release
#
# Paid tier build (Analytics Engine + Durable Objects):
#   cargo install worker-build && worker-build --release --features paid
[build]
command = "cargo install worker-build && worker-build --release"

# ── D1 Database ───────────────────────────────────────────────────────────────
# Available on the free tier.
# Create your database: wrangler d1 create worker_brute_d1
# Then fill in the database_id below.
[[d1_databases]]
binding = "worker_brute_d1"
database_name = "worker_brute_d1"
database_id = "YOUR_D1_DATABASE_ID"

# ── Analytics Engine ──────────────────────────────────────────────────────────
# Requires the Workers Paid plan ($5/month).
# To enable:
#   1. Uncomment the section below.
#   2. Rebuild with `--features paid` (update the [build] command above).
#
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "brute_attacks"

# ── Durable Objects (shared WebSocket broadcasting) ───────────────────────────
# WebSocket connections work on the free tier but each client is isolated to
# the Worker instance that served it. Durable Objects (paid) allow all clients
# across every Worker instance to receive every event simultaneously.
# Requires the Workers Paid plan ($5/month).
# To enable:
#   1. Uncomment both sections below.
#   2. Rebuild with `--features paid` (update the [build] command above).
#
# [durable_objects]
# bindings = [
#   { name = "WS_BROADCASTER", class_name = "WsBroadcaster" }
# ]
#
# [[migrations]]
# tag = "v1"
# new_classes = ["WsBroadcaster"]

# ── Cron Triggers ────────────────────────────────────────────────────────────
[triggers]
crons = ["0 3 * * *"]  # runs at 3am UTC daily

# ── Environment variables ─────────────────────────────────────────────────────
[vars]
BEARER_TOKEN = ""
# Optional — enables IP abuse reputation scoring via AbuseIPDB.
# Leave empty to disable.
ABUSEIPDB_KEY = ""
# Number of days to retain attack records in D1.
# Rows older than this threshold are pruned by the daily cron at 3am UTC.
DATA_RETENTION_DAYS = "90"
# Optional — enriches attack records with full IPinfo.io geo data.
# Two ways to enable (set one or both):
#   IPINFO_BASE_URL — set to your round-robin proxy URL; no token required,
#                     the proxy handles auth internally.
#   IPINFO_TOKEN    — set to your IPinfo API token to use https://ipinfo.io
#                     directly without a proxy.
# Leave both empty to fall back to Cloudflare's built-in cf geo data.
IPINFO_TOKEN = ""
IPINFO_BASE_URL = ""
